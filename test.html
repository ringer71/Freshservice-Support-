<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NB Industries – iframe Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
      max-width: 440px;
    }
    .tick {
      font-size: 56px;
      margin-bottom: 16px;
    }
    h1 {
      color: #1b2a4a;
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      color: #5a6478;
      font-size: 14px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      background: #e8f7ee;
      color: #1a7f4b;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">✅</div>
    <h1>iframe Test Successful!</h1>
    <p>If you can see this inside Freshservice, embedding is working correctly and we're good to build the full onboarding form.</p>
    <span class="badge">NB Industries · Freshservice Test</span>
  </div>
</body>
</html>
